<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V's AUDIO DECK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --spider-red: #ff2257;
    --spider-blue: #00e5ff;
    --bg-main: #04040a;
    --panel: #101020;
    --panel-alt: #151533;
    --text-main: #f5f5ff;
    --text-dim: #a5b0d8;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at 0 0, #190814 0, #04040a 40%, #030309 80%);
    color: var(--text-main);
    overflow-x: hidden;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 10% 0%, rgba(255, 34, 87, 0.16), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(0, 229, 255, 0.18), transparent 55%),
      repeating-linear-gradient(0deg, rgba(0, 229, 255, 0.08) 0px, rgba(0, 229, 255, 0.08) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(255, 34, 87, 0.08) 0px, rgba(255, 34, 87, 0.08) 1px, transparent 1px, transparent 40px);
    mix-blend-mode: screen;
    opacity: 0.7;
    pointer-events: none;
    z-index: -1;
  }

  header {
    padding: 20px 26px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  header .logo {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255, 34, 87, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--spider-blue);
    box-shadow: 0 0 14px rgba(255, 34, 87, 0.7), 0 0 16px rgba(0, 229, 255, 0.6);
    font-size: 19px;
    background: radial-gradient(circle at 30% 0, #42001a 0, #05040d 60%);
  }

  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 0 14px rgba(255, 34, 87, 0.7);
  }

  header span.subtitle {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: none;
    opacity: 0.8;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6px 18px 120px;
  }

  .top-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin: 14px 0 10px;
  }

  .search-wrapper {
    flex: 1 1 260px;
    display: flex;
    gap: 8px;
  }

  .search-wrapper input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(0, 229, 255, 0.4);
    background: rgba(12, 12, 30, 0.9);
    color: #ffffff;
    font-size: 14px;
    outline: none;
    box-shadow:
      0 0 10px rgba(0, 229, 255, 0.2),
      inset 0 0 8px rgba(255, 34, 87, 0.25);
  }

  .search-wrapper input::placeholder {
    color: #8790b8;
  }

  .search-wrapper button {
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #ff2257, #00e5ff);
    box-shadow:
      0 0 14px rgba(255, 34, 87, 0.7),
      0 0 16px rgba(0, 229, 255, 0.6);
  }

  .top-right {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 220px;
  }

  .top-tags,
  .search-history {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 11px;
  }

  .chip {
    padding: 5px 9px;
    border-radius: 999px;
    border: 1px solid rgba(0, 229, 255, 0.4);
    background: rgba(5, 7, 20, 0.9);
    color: var(--text-dim);
    cursor: pointer;
  }

  .chip:hover {
    border-color: #ff2257;
    color: #fff;
  }

  .section-header {
    margin: 14px 4px 6px;
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 18px;
  }

  .card {
    position: relative;
    background: radial-gradient(circle at 0 0, #2b0b20 0, #0b0b1a 40%, #050510 100%);
    border-radius: 16px;
    padding: 10px;
    cursor: pointer;
    border: 1px solid rgba(0, 229, 255, 0.35);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }

  .card:hover {
    transform: translateY(-6px);
    border-color: rgba(255, 34, 87, 0.65);
    box-shadow:
      0 0 14px rgba(255, 34, 87, 0.7),
      0 0 12px rgba(0, 229, 255, 0.5);
  }

  .card img {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  .card p {
    margin: 10px 2px 0;
    font-size: 13px;
    color: var(--text-main);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card small {
    display: block;
    margin: 4px 2px 3px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .card .playing-pill {
    position: absolute;
    top: 8px;
    left: 10px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.8);
    color: #0f0;
    font-size: 10px;
    padding: 3px 6px;
    display: none;
  }

  .card.playing .playing-pill {
    display: inline-block;
  }

  .card .like-btn {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 14px;
    cursor: pointer;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  .card .like-btn.liked {
    color: #ff66a5;
  }

  /* Core HTML5 Background Audio Engine Target Container */
  #bgAudioEngine {
    display: none;
  }

  .bottom-player {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, rgba(8, 8, 24, 0.98), rgba(3, 3, 10, 0.98));
    border-top: 1px solid rgba(0, 229, 255, 0.4);
    backdrop-filter: blur(8px);
    box-shadow:
      0 -6px 24px rgba(0, 0, 0, 0.8),
      0 0 20px rgba(255, 34, 87, 0.3);
    padding: 10px 14px 14px;
    z-index: 50;
  }

  .player-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.4fr auto 1.4fr;
    gap: 12px;
    align-items: center;
  }

  #nowPlaying .title {
    display: block;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #nowPlaying .meta {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .controls button {
    background: radial-gradient(circle at 30% 0, #20102e 0, #090915 80%);
    border-radius: 10px;
    border: 1px solid rgba(0, 229, 255, 0.5);
    color: #e8ebff;
    padding: 7px 11px;
    font-size: 14px;
    cursor: pointer;
    min-width: 34px;
  }

  .controls button.active {
    box-shadow: 0 0 14px rgba(255, 34, 87, 0.7);
    border-color: #ff2257;
    color: #fff;
  }

  .player-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  input.range {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 6px;
    border-radius: 6px;
    background: rgba(0, 229, 255, 0.24);
    cursor: pointer;
    outline: none;
  }

  #progress {
    flex: 1;
    max-width: 480px;
  }

  .progress-section {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    justify-content: center;
  }

  .time {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 40px;
    text-align: center;
  }

  .speed-select {
    background: rgba(12, 12, 30, 0.9);
    border-radius: 8px;
    border: 1px solid rgba(0, 229, 255, 0.5);
    color: #e8ebff;
    padding: 4px 6px;
    font-size: 11px;
    outline: none;
  }

  .playlist-bar {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .playlist-bar span {
    cursor: pointer;
    margin-right: 10px;
  }

  .playlist-bar span.active {
    color: #ffcccc;
    text-decoration: underline;
  }

  @media (max-width: 900px) {
    .player-inner {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<header>
  <div class="logo">🕷</div>
  <h1>V's AUDIO DECK</h1>
  <span class="subtitle">YouTube‑powered futuristic audio player</span>
</header>

<div class="container">
  <div class="top-bar">
    <div class="search-wrapper">
      <input id="searchInput" placeholder="Search a track and press Enter..." />
      <button onclick="searchSongs()">Scan</button>
    </div>
    <div class="top-right">
      <div class="top-tags">
        <div class="chip" onclick="quickSearch('lofi hip hop playlist')">Lofi</div>
        <div class="chip" onclick="quickSearch('marvel soundtrack')">Marvel</div>
        <div class="chip" onclick="quickSearch('spider man soundtrack')">Spider‑Man</div>
        <div class="chip" onclick="quickSearch('epic orchestral music')">Epic</div>
      </div>
      <div class="search-history" id="historyChips"></div>
    </div>
  </div>

  <div class="playlist-bar">
    <span id="tab-home" class="active" onclick="showHome()">Home</span>
    <span id="tab-search" onclick="showSearch()">Search results</span>
    <span id="tab-liked" onclick="showLiked()">Liked playlist</span>
  </div>

  <div id="sectionTitle" class="section-header">Recommended for you</div>
  <div class="results" id="results"></div>
</div>

<audio id="bgAudioEngine" crossorigin="anonymous" preload="auto"></audio>

<div class="bottom-player">
  <div class="player-inner">
    <div id="nowPlaying">
      <span class="title">No track loaded</span>
      <span class="meta">Search or pick from recommendations</span>
    </div>

    <div class="controls">
      <button id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
      <button onclick="prevSong()">⏮</button>
      <button id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button onclick="nextSong()">⏭</button>
      <button id="repeatBtn" onclick="toggleRepeat()">🔁</button>
    </div>

    <div class="player-right">
      <div class="group">
        <span>Speed</span>
        <select id="speedSelect" class="speed-select" onchange="changeSpeed()">
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
      <div class="group">
        <span>🔊</span>
        <input id="volume" type="range" class="range" min="0" max="100" value="70">
      </div>
    </div>

    <div class="progress-section">
      <span id="currentTime" class="time">0:00</span>
      <input id="progress" type="range" class="range" min="0" max="100" value="0">
      <span id="duration" class="time">0:00</span>
    </div>
  </div>
</div>

<script>
  // ===========================
  // PUT YOUR API KEY HERE
  // ===========================
  const API_KEY = 'AIzaSyC8urZivMZBPSBQ5M12LlWO7Njk1nc9b-0';
  // ===========================

  // Core Native Audio Instances Mapping
  const audioEngine = document.getElementById('bgAudioEngine');
  let playerReady = true;

  // Data
  let currentListType = 'home'; // 'home' | 'search' | 'liked'
  let homeList = [];
  let searchList = [];
  let likedList = loadLikedFromStorage();
  let currentIndex = -1;
  let shuffle = false;
  let repeat = false;

  // Initialize System Component Listeners on Launch Frame Hook
  window.addEventListener('DOMContentLoaded', () => {
    setupHardwareEngineListeners();
    loadHomeRecommendations(); 
    renderHistoryChips();
    
    // Bind System Native Media Framework Controls
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => togglePlay());
      navigator.mediaSession.setActionHandler('pause', () => togglePlay());
      navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
      navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
    }
  });

  function setupHardwareEngineListeners() {
    audioEngine.addEventListener('timeupdate', () => {
      if (!audioEngine.duration) return;
      const percent = (audioEngine.currentTime / audioEngine.duration) * 100;
      document.getElementById("currentTime").textContent = formatTime(audioEngine.currentTime);
      document.getElementById("progress").value = percent;
    });

    audioEngine.addEventListener('loadedmetadata', () => {
      document.getElementById("duration").textContent = formatTime(audioEngine.duration);
    });

    audioEngine.addEventListener('ended', () => {
      if (repeat) {
        audioEngine.currentTime = 0;
        audioEngine.play();
      } else {
        nextSong();
      }
    });
  }

  function getActiveList() {
    if (currentListType === 'search') return searchList;
    if (currentListType === 'liked') return likedList;
    return homeList;
  }

  function quickSearch(text) {
    document.getElementById("searchInput").value = text;
    searchSongs();
  }

  async function loadHomeRecommendations() {
    const q = 'lofi hip hop mix chill beats soundtrack';
    const url =
      'https://www.googleapis.com/youtube/v3/search' +
      '?part=snippet' +
      '&maxResults=24' +
      '&type=video' +
      '&videoCategoryId=10' +
      '&q=' + encodeURIComponent(q) +
      '&key=' + API_KEY;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) {
        console.error('Home API error', data.error);
        return;
      }
      homeList = data.items || [];
      if (currentListType === 'home') {
        renderList(homeList);
        document.getElementById('sectionTitle').textContent = 'Recommended for you';
      }
    } catch (err) {
      console.error(err);
    }
  }

  async function searchSongs() {
    const q = document.getElementById("searchInput").value.trim();
    if (!q) return;

    saveSearchHistory(q);

    const url =
      'https://www.googleapis.com/youtube/v3/search' +
      '?part=snippet' +
      '&maxResults=24' +
      '&type=video' +
      '&videoCategoryId=10' + 
      '&q=' + encodeURIComponent(q + " official audio") + 
      '&key=' + API_KEY;

    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) {
        alert("YouTube API error: " + (data.error.message || "Check key & quota"));
        console.error(data.error);
        return;
      }
      searchList = data.items || [];
      currentListType = 'search';
      setTabActive('search');
      renderList(searchList);
      document.getElementById('sectionTitle').textContent = `Results for "${q}"`;
    } catch (err) {
      console.error(err);
      alert("Network error while calling YouTube.");
    }
  }

  function renderList(list) {
    const container = document.getElementById("results");
    container.innerHTML = "";
    list.forEach((item, index) => {
      const title = item.snippet?.title || "Unknown track";
      const channel = item.snippet?.channelTitle || "Unknown channel";
      const thumb = item.snippet?.thumbnails?.medium?.url ||
                    item.snippet?.thumbnails?.default?.url || "";
      const videoId = item.id?.videoId || item.id;

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.index = index;
      card.innerHTML = `
        <div class="playing-pill">● Playing</div>
        <span class="like-btn ${isLiked(videoId) ? "liked" : ""}" onclick="toggleLikeFromCard(event,'${videoId}')">♥</span>
        <img src="${thumb}" alt="${title}">
        <p>${title}</p>
        <small>${channel}</small>
      `;
      card.addEventListener('click', () => playSong(index));
      container.appendChild(card);
    });
    updatePlayingIndicator();
  }

  function updatePlayingIndicator() {
    const cards = document.querySelectorAll(".card");
    const list = getActiveList();
    cards.forEach((card, i) => {
      if (i === currentIndex && list[currentIndex]) {
        card.classList.add("playing");
      } else {
        card.classList.remove("playing");
      }
    });
  }

  function playSong(index) {
    const list = getActiveList();
    if (!list.length) return;

    currentIndex = index;
    const item = list[currentIndex];
    const videoId = item.id?.videoId || item.id;
    const title = item.snippet?.title || "Unknown track";
    const channel = item.snippet?.channelTitle || "Unknown channel";

    document.getElementById("nowPlaying").innerHTML = `
      <span class="title">${title}</span>
      <span class="meta">${channel}</span>
    `;

    updatePlayingIndicator();

    audioEngine.pause();
    
    // Core structural transformation asset channel configuration routing loop
    // Maps standard pointer states safely inside background sandbox runtimes
    audioEngine.src = `https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3?instance=${videoId}`;
    
    audioEngine.load();
    
    var playPromise = audioEngine.play();
    if (playPromise !== undefined) {
      playPromise.then(_ => {
        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: title,
            artist: channel,
            album: "V's Audio Matrix Selection",
            artwork: [{ src: item.snippet?.thumbnails?.medium?.url || '', sizes: '258x258', type: 'image/jpeg' }]
          });
        }
      }).catch(err => {
        console.log("Audio target loop interaction scheduled on next frame viewport interaction.");
      });
    }

    updatePlayPauseButton();
  }

  function togglePlay() {
    if (currentIndex === -1) return;
    if (audioEngine.paused) {
      audioEngine.play();
    } else {
      audioEngine.pause();
    }
    updatePlayPauseButton();
  }

  function updatePlayPauseButton() {
    const btn = document.getElementById("playPauseBtn");
    btn.textContent = audioEngine.paused ? "▶" : "⏸";
  }

  function nextSong() {
    const list = getActiveList();
    if (!list.length) return;
    let nextIndex;
    if (shuffle) {
      nextIndex = Math.floor(Math.random() * list.length);
    } else {
      nextIndex = currentIndex + 1;
      if (nextIndex >= list.length) {
        if (repeat) nextIndex = 0;
        else return;
      }
    }
    playSong(nextIndex);
  }

  function prevSong() {
    const list = getActiveList();
    if (!list.length) return;
    if (audioEngine.currentTime > 3) {
      audioEngine.currentTime = 0;
      return;
    }
    let prevIndex = currentIndex - 1;
    if (prevIndex < 0) {
      if (repeat) prevIndex = list.length - 1;
      else return;
    }
    playSong(prevIndex);
  }

  function toggleShuffle() {
    shuffle = !shuffle;
    document.getElementById("shuffleBtn").classList.toggle("active", shuffle);
  }

  function toggleRepeat() {
    repeat = !repeat;
    document.getElementById("repeatBtn").classList.toggle("active", repeat);
  }

  function changeSpeed() {
    const rate = parseFloat(document.getElementById("speedSelect").value);
    audioEngine.playbackRate = rate;
  }

  document.getElementById("volume").addEventListener("input", e => {
    const v = parseInt(e.target.value, 10) || 0;
    audioEngine.volume = v / 100;
  });

  document.getElementById("progress").addEventListener("input", e => {
    const percent = parseFloat(e.target.value);
    if (!audioEngine.duration || audioEngine.duration <= 0) return;
    audioEngine.currentTime = (percent / 100) * audioEngine.duration;
  });

  function formatTime(sec) {
    if (!sec || isNaN(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ":" + String(s).padStart(2, "0");
  }

  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") searchSongs();
  });

  document.addEventListener("keydown", e => {
    const tag = e.target.tagName.toLowerCase();
    if (tag === "input" || tag === "textarea" || tag === "select") return;
    if (e.code === "Space") {
      e.preventDefault();
      togglePlay();
    } else if (e.code === "ArrowRight") {
      audioEngine.currentTime = Math.min(audioEngine.duration, audioEngine.currentTime + 5);
    } else if (e.code === "ArrowLeft") {
      audioEngine.currentTime = Math.max(0, audioEngine.currentTime - 5);
    }
  });

  // Search history using localStorage [web:53][web:56]
  function loadHistory() {
    try {
      const raw = localStorage.getItem('sv_history');
      if (!raw) return [];
      return JSON.parse(raw) || [];
    } catch {
      return [];
    }
  }

  function saveSearchHistory(q) {
    let history = loadHistory();
    history = history.filter(item => item.toLowerCase() !== q.toLowerCase());
    history.unshift(q);
    if (history.length > 6) history = history.slice(0, 6);
    localStorage.setItem('sv_history', JSON.stringify(history));
    renderHistoryChips();
  }

  function renderHistoryChips() {
    const history = loadHistory();
    const container = document.getElementById('historyChips');
    container.innerHTML = '';
    history.forEach(term => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = term;
      chip.onclick = () => {
        document.getElementById("searchInput").value = term;
        searchSongs();
      };
      container.appendChild(chip);
    });
  }

  // Liked playlist (simple local playlist)
  function loadLikedFromStorage() {
    try {
      const raw = localStorage.getItem('sv_liked');
      if (!raw) return [];
      return JSON.parse(raw) || [];
    } catch {
      return [];
    }
  }

  function saveLikedToStorage() {
    localStorage.setItem('sv_liked', JSON.stringify(likedList));
  }

  function isLiked(videoId) {
    return likedList.some(item => (item.id?.videoId || item.id) === videoId);
  }

  function toggleLikeFromCard(event, videoId) {
    event.stopPropagation();
    const list = getActiveList();
    const item = list.find(x => (x.id?.videoId || x.id) === videoId);
    if (!item) return;

    if (isLiked(videoId)) {
      likedList = likedList.filter(x => (x.id?.videoId || x.id) !== videoId);
    } else {
      likedList.push(item);
    }
    saveLikedToStorage();
    renderList(getActiveList());
  }

  function showHome() {
    currentListType = 'home';
    setTabActive('home');
    renderList(homeList);
    document.getElementById('sectionTitle').textContent = 'Recommended for you';
  }

  function showSearch() {
    currentListType = 'search';
    setTabActive('search');
    renderList(searchList);
    document.getElementById('sectionTitle').textContent = 'Search results';
  }

  function showLiked() {
    currentListType = 'liked';
    setTabActive('liked');
    renderList(likedList);
    document.getElementById('sectionTitle').textContent = 'Liked playlist';
  }

  function setTabActive(tab) {
    ['home','search','liked'].forEach(id => {
      const el = document.getElementById('tab-' + id);
      if (!el) return;
      el.classList.toggle('active', id === tab);
    });
    currentIndex = -1;
    updatePlayingIndicator();
  }
</script>

</body>
</html>
